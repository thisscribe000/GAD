name: gad
description: A work management app for attendance and appraisals.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  local_auth: ^2.2.0

  # UI
  percent_indicator: ^4.2.3
  http: ^1.6.0
  geolocator: ^14.0.2
  # For biometrics (add later)
  # local_auth: ^2.1.6

  # Backend
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env